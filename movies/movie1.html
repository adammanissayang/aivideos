            <a href="#" class="btn" onclick="openYoutubeModal(); return false;">

        <div class="rating" onclick="openQRModal()">

                <div class="rating-header">
                    <span>Sumbangan penonton</span>
                    <span id="score">0%</span>
                </div>

                <div class="rating-bar">
                    <div class="rating-fill" id="ratingFill"></div>

</div>

            <script>

                const target = 92;

                const score = document.getElementById("score");
                const ratingFill = document.getElementById("ratingFill");

                let current = 0;

                const timer = setInterval(function(){

                    current++;

                    score.textContent = current + "Riya";
                    ratingFill.style.width = current + "%";

                    if(current >= target){
                        clearInterval(timer);
                    }

                },20);

            </script>






            


        <div id="youtubeModal" class="youtube-modal">

            <div class="youtube-container">

                <button class="close-btn" onclick="closeYoutubeModal()">
                    &times;
                </button>


                <iframe 
                    id="youtubeFrame"
                    src=""
                    title="YouTube video player"
                    frameborder="0"
                    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
                    referrerpolicy="strict-origin-when-cross-origin"
                    allowfullscreen>
                </iframe>





            </div>

        </div>


        <script>
               function openYoutubeModal() {

                    if (typeof gtag === 'function') {
                        gtag('event', 'button_click', {
                            button_name: 'Tonton now'
                        });
                    }

                    let videoURL = "https://www.youtube.com/embed/5dE_ydol-1c?si=t5xmjBS0RyouBeib&autoplay=1";

                    document.getElementById("youtubeFrame").src = videoURL;
                    document.getElementById("youtubeModal").style.display = "flex";
                }


                function closeYoutubeModal() {

                    document.getElementById("youtubeModal").style.display = "none";

                    // Stop video bila tutup
                    document.getElementById("youtubeFrame").src = "";
                }


                // Tutup bila klik kawasan luar video
                window.onclick = function(event) {
                    let modal = document.getElementById("youtubeModal");

                    if (event.target == modal) {
                        closeYoutubeModal();
                    }
                }
            </script>



        <div id="qrModal" class="youtube-modal">

            <div class="youtube-container qr-box">

                <button class="close-btn" onclick="closeQRModal()">

        <script>

            function openQRModal(){

            if(typeof gtag === "function"){

            document.getElementById("qrModal").style.display="none";
